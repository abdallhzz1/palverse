[program:palverse-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/palverse/artisan queue:work redis --queue=mail,default --sleep=3 --tries=3 --max-time=3600 --timeout=90 --backoff=60,300,900
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/palverse/storage/logs/worker.log
stopwaitsecs=3600
