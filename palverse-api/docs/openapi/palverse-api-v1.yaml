                name_ar:
                  type: string
                  example: "مطعم الزيتون"
                name_en:
                  type: string
                  example: "Al-Zaytoun Restaurant"
                description_ar:
                  type: string
                description_en:
                  type: string
                category_public_id:
                  type: string
                  example: "01HZ..."
                city_public_id:
                  type: string
                  example: "01HZ..."
                zone_public_id:
                  type: string
                  nullable: true
                  example: "01HZ..."
                phone:
                  type: string
                  example: "+970598000000"
                whatsapp:
                  type: string
                  example: "+970598000000"
                email:
                  type: string
                  format: email
                website:
                  type: string
                  format: uri
                address_ar:
                  type: string
                address_en:
                  type: string
                latitude:
                  type: number
                longitude:
                  type: number
      responses:
        '201':
          description: Store created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Store'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

