  # ── Merchant Working Hours ─────────────────────────────────────────────────

  /merchant/stores/{publicId}/working-hours:
    get:
      operationId: merchantGetWorkingHours
      tags: [Working Hours]
      summary: Get store working hours
      description: Returns working hours grouped by day of week.
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Working hours for all 7 days.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkingHoursDay'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      operationId: merchantUpdateWorkingHours
      tags: [Working Hours]
      summary: Update store working hours
      description: |
        Replaces all working hours for the store. Must supply all 7 days.
        Each day can have multiple time periods or be marked as closed.
        Periods must not overlap within the same day.
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [days]
              properties:
                days:
                  type: array
                  minItems: 7
                  maxItems: 7
                  items:
                    type: object
                    required: [day_of_week, is_closed]
                    properties:
                      day_of_week:
                        type: integer
                        minimum: 0
                        maximum: 6
                        description: 0=Sunday, 1=Monday ... 6=Saturday
                      is_closed:
                        type: boolean
                      periods:
                        type: array
                        description: Required when is_closed is false.
                        items:
                          type: object
                          required: [opens_at, closes_at]
                          properties:
                            opens_at:
                              type: string
                              pattern: '^\d{2}:\d{2}$'
                              example: "09:00"
                            closes_at:
                              type: string
                              pattern: '^\d{2}:\d{2}$'
                              example: "18:00"
            example:
              days:
                - day_of_week: 0
                  is_closed: true
                  periods: []
                - day_of_week: 1
                  is_closed: false
                  periods:
                    - opens_at: "09:00"
                      closes_at: "18:00"
      responses:
        '200':
          description: Working hours updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkingHoursDay'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

