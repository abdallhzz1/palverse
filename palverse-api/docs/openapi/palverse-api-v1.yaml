    post:
      operationId: adminCreateSubscriptionPlan
      tags: [Subscription Plans]
      summary: Create a subscription plan
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name_ar, code, price, duration_days]
              properties:
                name_ar:
                  type: string
                  example: "الخطة الذهبية"
                name_en:
                  type: string
                code:
                  type: string
                  example: "gold"
                description_ar:
                  type: string
                description_en:
                  type: string
                price:
                  type: number
                  example: 99.00
                currency:
                  type: string
                  default: "ILS"
                duration_days:
                  type: integer
                  example: 365
                max_offers:
                  type: integer
                  nullable: true
                max_gallery_images:
                  type: integer
                  nullable: true
                is_active:
                  type: boolean
                  default: true
                sort_order:
                  type: integer
                  default: 0
      responses:
        '201':
          description: Plan created.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /admin/subscription-plans/{publicId}:
    get:
      operationId: adminGetSubscriptionPlan
      tags: [Subscription Plans]
      summary: Get subscription plan (admin)
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Plan detail.

    put:
      operationId: adminUpdateSubscriptionPlan
      tags: [Subscription Plans]
      summary: Update a subscription plan
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name_ar:
                  type: string
                name_en:
                  type: string
                description_ar:
                  type: string
                description_en:
                  type: string
                price:
                  type: number
                currency:
                  type: string
                duration_days:
                  type: integer
                max_offers:
                  type: integer
                max_gallery_images:
                  type: integer
                is_active:
                  type: boolean
                sort_order:
                  type: integer
      responses:
        '200':
          description: Plan updated.

    delete:
      operationId: adminDeleteSubscriptionPlan
      tags: [Subscription Plans]
      summary: Delete a subscription plan
