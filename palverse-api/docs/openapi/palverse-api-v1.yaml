  # ── Admin Subscriptions ───────────────────────────────────────────────────

  /admin/subscriptions:
    get:
      operationId: adminListSubscriptions
      tags: [Subscriptions]
      summary: List all subscriptions (admin)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, active, expired, cancelled]
        - name: store
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated subscriptions.

  /admin/subscriptions/assign:
    post:
      operationId: adminAssignSubscription
      tags: [Subscriptions]
      summary: Assign a subscription to a store
      description: |
        Assigns a subscription plan to a store, optionally with a custom start date.
        **Requires:** `subscriptions.manage` permission.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [store_public_id, plan_public_id]
              properties:
                store_public_id:
                  type: string
                plan_public_id:
                  type: string
                starts_at:
                  type: string
                  format: date-time
                  nullable: true
                  description: Defaults to now() if not provided.
                notes:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Subscription assigned.
        '409':
          description: Store already has an active subscription.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /admin/subscriptions/{publicId}:
    get:
      operationId: adminGetSubscription
      tags: [Subscriptions]
      summary: Get subscription (admin)
