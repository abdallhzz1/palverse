        '404':
          $ref: '#/components/responses/NotFound'

  # ── Merchant Store Links & QR ──────────────────────────────────────────────

  /merchant/stores/{storePublicId}/links:
    get:
      operationId: merchantGetStoreLinks
      tags: [QR and Deep Links]
      summary: Get store links (merchant)
      description: |
        Returns web URL, deep link, and QR URLs for a store owned by the merchant.
        Also indicates whether the store is publicly visible.
      security:
        - BearerAuth: []
      parameters:
        - name: storePublicId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Store link data.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StoreLinks'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /merchant/stores/{storePublicId}/qr:
    get:
      operationId: merchantGetStoreQr
      tags: [QR and Deep Links]
      summary: Get store QR code (merchant)
      description: |
        Returns an SVG or PNG QR code. Returns 409 if the store has no slug yet.
        **This endpoint returns an image, not JSON.**
      security:
        - BearerAuth: []
      parameters:
        - name: storePublicId
          in: path
          required: true
          schema:
            type: string
        - name: size
          in: query
          schema:
            type: integer
            minimum: 128
            maximum: 1024
            default: 512
        - name: format
          in: query
          schema:
            type: string
            enum: [svg, png]
            default: svg
        - name: download
          in: query
          schema:
            type: integer
            enum: [0, 1]
            default: 0
      responses:
        '200':
          description: QR code image.
          content:
            image/svg+xml:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Store has no slug (pending approval).

