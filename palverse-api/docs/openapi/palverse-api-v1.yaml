  # ── Merchant Offers ────────────────────────────────────────────────────────

  /merchant/stores/{publicId}/offers:
    get:
      operationId: merchantListOffers
      tags: [Offers]
      summary: List store offers (merchant)
      description: Returns all offers for the merchant's store (active and inactive).
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Paginated offers.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Offer'

    post:
      operationId: merchantCreateOffer
      tags: [Offers]
      summary: Create a store offer
      description: |
        Creates a new offer for the store.
        **Maximum:** 50 offers per store (configurable via `MERCHANT_OFFER_LIMIT_PER_STORE`).
        **Requires:** Verified email, `offers.manage` permission.

        Image upload is separate (use the offer image upload endpoint if needed).
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title_ar]
              properties:
                title_ar:
                  type: string
                  example: "خصم 30% على وجبات الغداء"
                title_en:
                  type: string
                description_ar:
                  type: string
                description_en:
                  type: string
                price:
                  type: number
                  example: 35.00
                old_price:
                  type: number
                  example: 50.00
                currency:
                  type: string
                  default: "ILS"
                image:
                  type: string
                  format: binary
                  description: Offer image (jpeg/jpg/png/webp, max 4MB). Optional.
                starts_at:
                  type: string
                  format: date-time
                ends_at:
                  type: string
                  format: date-time
                is_active:
                  type: boolean
                  default: true
                sort_order:
                  type: integer
      responses:
        '201':
          description: Offer created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Offer'
        '409':
          description: Offer limit reached.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /merchant/stores/{publicId}/offers/{offerPublicId}:
    get:
      operationId: merchantGetOffer
      tags: [Offers]
      summary: Get offer detail (merchant)
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
        - name: offerPublicId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Offer detail.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Offer'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      operationId: merchantUpdateOffer
      tags: [Offers]
      summary: Update an offer
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
        - name: offerPublicId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title_ar:
                  type: string
                title_en:
                  type: string
                description_ar:
                  type: string
                description_en:
                  type: string
                price:
                  type: number
                old_price:
                  type: number
                currency:
                  type: string
                image:
                  type: string
                  format: binary
                starts_at:
                  type: string
                  format: date-time
                ends_at:
                  type: string
                  format: date-time
                is_active:
                  type: boolean
                sort_order:
                  type: integer
      responses:
        '200':
          description: Offer updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Offer'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    delete:
      operationId: merchantDeleteOffer
      tags: [Offers]
      summary: Delete an offer
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
        - name: offerPublicId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Offer deleted.
        '404':
          $ref: '#/components/responses/NotFound'

