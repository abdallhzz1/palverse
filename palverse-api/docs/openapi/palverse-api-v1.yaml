      description: |
        Creates a new store for the authenticated merchant.
        **Requires:** Verified email, `stores.manage` permission.
        The store starts in `pending` status awaiting admin approval.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name_ar, category_public_id, city_public_id]
