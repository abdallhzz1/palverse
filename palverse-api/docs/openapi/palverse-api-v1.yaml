            schema:
              type: object
              properties:
                name_ar:
                  type: string
                name_en:
                  type: string
                description_ar:
                  type: string
                description_en:
                  type: string
                category_public_id:
                  type: string
                city_public_id:
                  type: string
                zone_public_id:
                  type: string
                  nullable: true
                phone:
                  type: string
                whatsapp:
                  type: string
                email:
                  type: string
                  format: email
                website:
                  type: string
                  format: uri
                address_ar:
                  type: string
                address_en:
                  type: string
                latitude:
                  type: number
                longitude:
                  type: number
      responses:
        '200':
          description: Store updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Store'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
