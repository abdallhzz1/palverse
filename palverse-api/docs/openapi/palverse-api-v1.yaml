                      $ref: '#/components/schemas/SocialLink'

    post:
      operationId: merchantCreateSocialLink
      tags: [Social Links]
      summary: Add a social link
      description: |
        Adds a social link to the store.
        Each platform can only be added once per store.
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [platform, url]
              properties:
                platform:
                  type: string
                  enum: [facebook, instagram, tiktok, linkedin, youtube, x, telegram, snapchat, other]
                  example: "instagram"
                url:
                  type: string
                  format: uri
                  example: "https://instagram.com/zaytoun.store"
      responses:
        '201':
          description: Social link created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SocialLink'
        '409':
          description: Platform already linked.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /merchant/stores/{publicId}/social-links/{socialLinkPublicId}:
    get:
      operationId: merchantGetSocialLink
      tags: [Social Links]
      summary: Get a social link
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
        - name: socialLinkPublicId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Social link detail.
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      operationId: merchantUpdateSocialLink
      tags: [Social Links]
      summary: Update a social link
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
        - name: socialLinkPublicId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                platform:
                  type: string
                  enum: [facebook, instagram, tiktok, linkedin, youtube, x, telegram, snapchat, other]
                url:
                  type: string
                  format: uri
      responses:
        '200':
          description: Social link updated.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    delete:
      operationId: merchantDeleteSocialLink
      tags: [Social Links]
      summary: Delete a social link
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
