        - name: publicId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Store links.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StoreLinks'

  /admin/stores/{publicId}/qr:
    get:
      operationId: adminGetStoreQr
      tags: [QR and Deep Links]
      summary: Get store QR code (admin)
      description: Returns QR code image. Returns 409 if the store has no slug yet.
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
        - name: size
          in: query
          schema:
            type: integer
            minimum: 128
            maximum: 1024
            default: 512
        - name: format
          in: query
          schema:
