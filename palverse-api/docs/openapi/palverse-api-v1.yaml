  # ── Admin Users ───────────────────────────────────────────────────────────

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [Users]
      summary: List users (admin)
      description: |
        Returns paginated list of all users.
        **Requires:** `users.manage` permission.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: role
          in: query
          schema:
            type: string
            enum: [admin, merchant]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, suspended]
        - name: query
          in: query
          schema:
            type: string
          description: Search by name or email.
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/DirectionParam'
      responses:
        '200':
          description: Paginated users.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/users/merchants:
    post:
      operationId: adminCreateMerchant
      tags: [Users]
      summary: Create a merchant user (admin)
      description: Admin creates a merchant account on behalf of a merchant.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, password_confirmation]
              properties:
                name:
                  type: string
                  example: "محمد يوسف"
                email:
                  type: string
                  format: email
                phone:
                  type: string
                password:
                  type: string
                  format: password
                  minLength: 8
                password_confirmation:
                  type: string
                preferred_locale:
                  type: string
                  enum: [ar, en]
      responses:
        '201':
          description: Merchant created.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /admin/users/{publicId}:
    get:
      operationId: adminGetUser
      tags: [Users]
      summary: Get user (admin)
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User detail.
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      operationId: adminUpdateUser
      tags: [Users]
      summary: Update a user (admin)
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
                preferred_locale:
                  type: string
      responses:
        '200':
          description: User updated.

  /admin/users/{publicId}/suspend:
    patch:
      operationId: adminSuspendUser
      tags: [Users]
      summary: Suspend a user
      description: |
        Suspends a user. Cannot suspend yourself or the last admin account.
        **Requires:** `users.manage` permission.
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [suspension_reason]
              properties:
                suspension_reason:
                  type: string
                  example: "انتهاك شروط الاستخدام."
      responses:
        '200':
          description: User suspended.
        '409':
          description: Cannot suspend self or last admin.
          content:
            application/json:
              example:
                success: false
                message: "لا يمكن تعطيل آخر حساب مسؤول."
                error:
                  code: USER_SELF_DISABLE_NOT_ALLOWED
                  details: {}

