    patch:
      operationId: adminCancelSubscription
      tags: [Subscriptions]
      summary: Cancel a subscription
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cancellation_reason:
                  type: string
      responses:
        '200':
          description: Subscription cancelled.
        '409':
          description: Subscription cannot be cancelled in its current state.

