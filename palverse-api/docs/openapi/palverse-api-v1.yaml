openapi: 3.1.0

info:
  title: Palverse API
  version: 1.0.0
  description: |
    ## Palverse — Palestinian Business Directory API

    Palverse is a bilingual (Arabic / English) Palestinian business directory platform.
    This API serves three client groups:

    - **Public** — unauthenticated access to directory data.
    - **Merchant** — authenticated access for business owners managing their stores.
    - **Admin** — authenticated access for platform administrators.

    ### Authentication
    All authenticated endpoints require a Bearer token obtained via `POST /api/v1/auth/login`
    or `POST /api/v1/auth/register/merchant`. Tokens are issued by Laravel Sanctum.

    ### Response Envelope
    Every response follows a standard envelope:
    ```json
    {
      "success": true,
      "message": "...",
      "data": { ... }
    }
    ```
    Errors use:
    ```json
    {
      "success": false,
      "message": "...",
      "error": { "code": "ERROR_CODE", "details": {} }
    }
    ```

    ### Pagination
    Paginated list endpoints include:
    ```json
    {
      "data": [...],
      "meta": { "current_page": 1, "last_page": 5, "per_page": 15, "total": 73 },
      "links": { "first": "...", "last": "...", "prev": null, "next": "..." }
    }
    ```

    ### Bilingual Support
    All user-facing string fields are duplicated with `_ar` and `_en` suffixes.
    Clients should render the appropriate locale based on user preference.

    ### Identifiers
    All public identifiers use ULIDs exposed as `public_id`.
    Numeric database IDs are never exposed.

    ### Correlation IDs
    Every response includes an `X-Correlation-ID` header for distributed tracing.
    Clients may supply their own value; the server echoes it back.
  contact:
    name: Palverse Support
    email: support@example.test
  license:
    name: Proprietary
    identifier: proprietary

servers:
  - url: http://localhost:8000/api/v1
    description: Local development server
  - url: https://api-staging.palverse.example/api/v1
    description: Staging server (placeholder)
  - url: https://api.palverse.example/api/v1
    description: Production server (placeholder)

# ─────────────────────────────────────────────────────────────────────────────
# Security Schemes
# ─────────────────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum Token
      description: |
        Laravel Sanctum personal access token.
        Obtain via `POST /auth/login` or `POST /auth/register/merchant`.
        Include as: `Authorization: Bearer <token>`

  # ──────────────────────────────────────────────────────────────────────────
  # Reusable Parameters
  # ──────────────────────────────────────────────────────────────────────────
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for paginated results.
    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 15
      description: Number of items per page.
    SortParam:
      name: sort
      in: query
      schema:
        type: string
      description: Field to sort by.
    DirectionParam:
      name: direction
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
      description: Sort direction.

  # ──────────────────────────────────────────────────────────────────────────
  # Reusable Schemas
  # ──────────────────────────────────────────────────────────────────────────
  schemas:

    # ── Envelope Wrappers ────────────────────────────────────────────────────

    SuccessResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "تمت العملية بنجاح."
        data:
          type: object
          description: Response payload. Shape varies per endpoint.

    ErrorResponse:
      type: object
      required: [success, message, error]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "حدث خطأ."
        error:
          type: object
          required: [code, details]
          properties:
            code:
              type: string
              example: RESOURCE_NOT_FOUND
            details:
              type: object
              additionalProperties: true
              example: {}

    ValidationErrorResponse:
      type: object
      required: [success, message, error, errors]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "بيانات المدخلات غير صالحة."
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            details:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
              example:
                email: ["The email field is required."]
        errors:
          type: object
          description: Flat copy of error.details for compatibility.
          additionalProperties:
            type: array
            items:
              type: string

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        last_page:
          type: integer
          example: 5
        per_page:
          type: integer
          example: 15
        total:
          type: integer
          example: 73
        from:
          type: integer
          nullable: true
          example: 1
        to:
          type: integer
          nullable: true
          example: 15

    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          nullable: true
        last:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
        next:
          type: string
          nullable: true

    # ── Domain Schemas ───────────────────────────────────────────────────────

    AuthUser:
      type: object
      description: Authenticated user profile returned after login/register.
      properties:
        public_id:
          type: string
          example: "01HZ..."
        name:
          type: string
          example: "أحمد محمود"
        email:
          type: string
          format: email
          example: "merchant@example.test"
        phone:
          type: string
          nullable: true
          example: "+970590000000"
        preferred_locale:
          type: string
          example: "ar"
        status:
          type: string
          enum: [active, inactive, suspended]
          example: "active"
        roles:
          type: array
          items:
            type: string
          example: ["merchant"]
        permissions:
          type: array
          items:
            type: string
          example: ["stores.manage", "offers.manage"]
        email_verified_at:
          type: string
          format: date-time
          nullable: true
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    User:
      type: object
      description: Admin-facing user management object.
      properties:
        public_id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        preferred_locale:
          type: string
        status:
          type: string
          enum: [active, inactive, suspended]
        roles:
          type: array
          items:
            type: string
        email_verified_at:
          type: string
          format: date-time
          nullable: true
        last_login_at:
          type: string
          format: date-time
          nullable: true
        suspended_at:
          type: string
          format: date-time
          nullable: true
        suspension_reason:
          type: string
          nullable: true
          description: Only visible to admins with users.manage permission.
        deactivated_at:
          type: string
          format: date-time
          nullable: true
        stores_count:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        created_by:
          type: object
          nullable: true
          properties:
            public_id:
              type: string
            name:
              type: string
        suspended_by:
          type: object
          nullable: true
          properties:
            public_id:
              type: string
            name:
              type: string
        deactivated_by:
          type: object
          nullable: true
          properties:
            public_id:
              type: string
            name:
              type: string

    Session:
      type: object
      properties:
        public_id:
          type: string
          example: "01HZ..."
        device_name:
          type: string
          nullable: true
          example: "iPhone 15"
        device_type:
          type: string
          nullable: true
          example: "mobile"
        ip_address:
          type: string
          nullable: true
          example: "192.168.1.1"
        last_used_at:
          type: string
          format: date-time
          nullable: true
        is_current:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time

    Category:
      type: object
      properties:
        public_id:
          type: string
          example: "01HZ..."
        name_ar:
          type: string
          example: "مطاعم وكافيهات"
        name_en:
          type: string
          example: "Restaurants & Cafes"
        slug:
          type: string
          example: "restaurants-cafes"
        description_ar:
          type: string
          nullable: true
        description_en:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        is_active:
          type: boolean
          example: true
        sort_order:
          type: integer
          example: 1
        stores_count:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    City:
      type: object
      properties:
        public_id:
          type: string
          example: "01HZ..."
        name_ar:
          type: string
          example: "رام الله"
        name_en:
          type: string
          example: "Ramallah"
        is_active:
          type: boolean
          example: true
        stores_count:
          type: integer
          nullable: true
        zones_count:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Zone:
      type: object
      properties:
        public_id:
          type: string
          example: "01HZ..."
        name_ar:
          type: string
          example: "المنارة"
        name_en:
          type: string
          example: "Al-Manara"
        city:
          $ref: '#/components/schemas/City'
        is_active:
          type: boolean
          example: true
        stores_count:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Store:
      type: object
      description: Full store object returned from store detail endpoints.
      properties:
        public_id:
          type: string
          example: "01HZ..."
        name_ar:
          type: string
          example: "مطعم الزيتون"
        name_en:
          type: string
          nullable: true
          example: "Al-Zaytoun Restaurant"
        description_ar:
          type: string
          nullable: true
        description_en:
          type: string
          nullable: true
        slug:
          type: string
          nullable: true
          example: "al-zaytoun-restaurant"
          description: |
            Null until admin approves the store and a slug is assigned.
        web_url:
          type: string
          nullable: true
          example: "http://localhost:3000/stores/al-zaytoun-restaurant"
        deep_link:
          type: string
          nullable: true
          example: "palverse://stores/al-zaytoun-restaurant"
        qr_url:
          type: string
          nullable: true
          description: Only present in detail views (not lists).
        phone:
          type: string
          nullable: true
          example: "+970598000000"
        whatsapp:
          type: string
          nullable: true
          example: "+970598000000"
        email:
          type: string
          nullable: true
          format: email
        website:
          type: string
          nullable: true
          format: uri
        address_ar:
          type: string
          nullable: true
        address_en:
          type: string
          nullable: true
        latitude:
          type: number
          format: double
          nullable: true
          example: 31.9038
        longitude:
          type: number
          format: double
          nullable: true
          example: 35.2034
        status:
          type: string
          enum: [pending, approved, rejected]
          example: "approved"
        is_active:
          type: boolean
          example: true
        approved_at:
          type: string
          format: date-time
          nullable: true
        rejected_at:
          type: string
          format: date-time
          nullable: true
        rejection_reason:
          type: string
          nullable: true
          description: Only visible to admin or the store owner.
        owner:
          type: object
          nullable: true
          description: Only loaded in admin context.
          properties:
            public_id:
              type: string
            name:
              type: string
            email:
              type: string
        category:
          type: object
          nullable: true
          properties:
            public_id:
              type: string
            name_ar:
              type: string
            name_en:
              type: string
            slug:
              type: string
        city:
          type: object
          nullable: true
          properties:
            public_id:
              type: string
            name_ar:
              type: string
            name_en:
              type: string
        zone:
          type: object
          nullable: true
          properties:
            public_id:
              type: string
            name_ar:
              type: string
            name_en:
              type: string
        logo:
          $ref: '#/components/schemas/StoreMedia'
        cover:
          $ref: '#/components/schemas/StoreMedia'
        gallery:
          type: array
          items:
            $ref: '#/components/schemas/StoreMedia'
        offers_count:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StoreMedia:
      type: object
      nullable: true
      properties:
        public_id:
          type: string
        type:
          type: string
          enum: [logo, cover, gallery]
        url:
          type: string
          format: uri
        disk:
          type: string
          example: "public"
        mime_type:
          type: string
          nullable: true
          example: "image/jpeg"
        size:
          type: integer
          nullable: true
          description: File size in bytes.
        sort_order:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time

    WorkingHoursDay:
      type: object
      description: Grouped working hours for a single day.
      properties:
        day_of_week:
          type: integer
          minimum: 0
          maximum: 6
          description: 0=Sunday, 1=Monday, ..., 6=Saturday
          example: 0
        day_label_ar:
          type: string
          example: "الأحد"
        day_label_en:
          type: string
          example: "Sunday"
        is_closed:
          type: boolean
          example: false
        periods:
          type: array
          items:
            type: object
            properties:
              public_id:
                type: string
              opens_at:
                type: string
                example: "09:00"
              closes_at:
                type: string
                example: "17:00"

    SocialLink:
      type: object
      properties:
        public_id:
          type: string
        platform:
          type: string
          enum: [facebook, instagram, tiktok, linkedin, youtube, x, telegram, snapchat, other]
          example: "instagram"
        url:
          type: string
          format: uri
          example: "https://instagram.com/zaytoun.store"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Offer:
      type: object
      properties:
        public_id:
          type: string
        title_ar:
          type: string
          example: "خصم 30% على وجبات الغداء"
        title_en:
          type: string
          nullable: true
        description_ar:
          type: string
          nullable: true
        description_en:
          type: string
          nullable: true
        price:
          type: string
          nullable: true
          example: "35.00"
        old_price:
          type: string
          nullable: true
          example: "50.00"
        currency:
          type: string
          example: "ILS"
        discount_percentage:
          type: integer
          nullable: true
          example: 30
          description: Computed field — present when both price and old_price are set.
        image_url:
          type: string
          format: uri
          nullable: true
        starts_at:
          type: string
          format: date-time
          nullable: true
        ends_at:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: boolean
        is_currently_valid:
          type: boolean
          description: True if the offer is within its active date range.
        sort_order:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SubscriptionPlan:
      type: object
      properties:
        public_id:
          type: string
        name_ar:
          type: string
          example: "الخطة الذهبية"
        name_en:
          type: string
          nullable: true
        code:
          type: string
          example: "gold"
        description_ar:
          type: string
          nullable: true
        description_en:
          type: string
          nullable: true
        price:
          type: string
          example: "99.00"
        currency:
          type: string
          example: "ILS"
        duration_days:
          type: integer
          example: 365
        max_offers:
          type: integer
          nullable: true
        max_gallery_images:
          type: integer
          nullable: true
        is_active:
          type: boolean
        sort_order:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StoreSubscription:
      type: object
      properties:
        public_id:
          type: string
        status:
          type: string
          enum: [pending, active, expired, cancelled]
        starts_at:
          type: string
          format: date-time
          nullable: true
        ends_at:
          type: string
          format: date-time
          nullable: true
        activated_at:
          type: string
          format: date-time
          nullable: true
        cancelled_at:
          type: string
          format: date-time
          nullable: true
        expired_at:
          type: string
          format: date-time
          nullable: true
        cancellation_reason:
          type: string
          nullable: true
          description: Visible to admin and store owner only.
        notes:
          type: string
          nullable: true
          description: Admin-only field.
        price_snapshot:
          type: string
          nullable: true
          example: "99.00"
        currency_snapshot:
          type: string
          nullable: true
          example: "ILS"
        plan_name_ar_snapshot:
          type: string
          nullable: true
        plan_name_en_snapshot:
          type: string
          nullable: true
        is_currently_valid:
          type: boolean
        plan:
          $ref: '#/components/schemas/SubscriptionPlan'
        assigned_by:
          type: object
          nullable: true
          description: Admin-only field.
          properties:
            public_id:
              type: string
            name:
              type: string
        cancelled_by:
          type: object
          nullable: true
          description: Admin-only field.
          properties:
            public_id:
              type: string
            name:
              type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Laravel notification UUID.
        type:
          type: string
          example: "subscription_expiring"
        title_ar:
          type: string
          nullable: true
        title_en:
          type: string
          nullable: true
        message_ar:
          type: string
          nullable: true
        message_en:
          type: string
          nullable: true
        entity_type:
          type: string
          nullable: true
          example: "store_subscription"
        entity_public_id:
          type: string
          nullable: true
        action_url:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        is_read:
          type: boolean
        read_at:
          type: string
          nullable: true
          example: "2026-01-15 10:30:00"
        created_at:
          type: string
          example: "2026-01-14 08:00:00"

    StoreLinks:
      type: object
      properties:
        store_public_id:
          type: string
        slug:
          type: string
          nullable: true
        web_url:
          type: string
          format: uri
        deep_link:
          type: string
        qr_svg_url:
          type: string
          format: uri
        qr_download_url:
          type: string
          format: uri
        is_publicly_visible:
          type: boolean
        generated_at:
          type: string
          example: "2026-07-14 10:30:00"

    StaticPage:
      type: object
      properties:
        public_id:
          type: string
          nullable: true
          description: Only present in admin responses.
        slug:
          type: string
          example: "about-us"
        title_ar:
          type: string
        title_en:
          type: string
          nullable: true
        content_ar:
          type: string
        content_en:
          type: string
          nullable: true
        excerpt_ar:
          type: string
          nullable: true
        excerpt_en:
          type: string
          nullable: true
        is_published:
          type: boolean
          nullable: true
          description: Only present in admin responses.
        published_at:
          type: string
          format: date-time
          nullable: true
        sort_order:
          type: integer
          nullable: true
          description: Only present in admin responses.
        seo_title_ar:
          type: string
          nullable: true
        seo_title_en:
          type: string
          nullable: true
        seo_description_ar:
          type: string
          nullable: true
        seo_description_en:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
          description: Only present in admin responses.
        updated_at:
          type: string
          format: date-time
          nullable: true

    FAQ:
      type: object
      properties:
        public_id:
          type: string
          nullable: true
          description: Only present in admin responses.
        question_ar:
          type: string
        question_en:
          type: string
          nullable: true
        answer_ar:
          type: string
        answer_en:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        sort_order:
          type: integer
        is_active:
          type: boolean
          nullable: true
          description: Only present in admin responses.
        created_at:
          type: string
          format: date-time
          nullable: true
          description: Only present in admin responses.
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: Only present in admin responses.

    SystemSetting:
      type: object
      description: |
        A single key-value system setting.
        Settings are grouped by keys: general, branding, contact, social, application, maintenance.
      properties:
        key:
          type: string
          example: "platform_name_ar"
        value:
          type: string
          nullable: true
          example: "بالفرس"
        group:
          type: string
          example: "general"

    AuditLog:
      type: object
      properties:
        public_id:
          type: string
        action:
          type: string
          example: "store.approved"
          description: Stable action string from AuditAction enum.
        actor:
          type: object
          nullable: true
          properties:
            type:
              type: string
              example: "user"
            public_id:
              type: string
              nullable: true
            name:
              type: string
              nullable: true
            email:
              type: string
              nullable: true
        subject:
          type: object
          nullable: true
          properties:
            type:
              type: string
              example: "store"
            public_id:
              type: string
              nullable: true
            label:
              type: string
              nullable: true
        route:
          type: string
          nullable: true
        method:
          type: string
          nullable: true
          example: "PATCH"
        ip_address:
          type: string
          nullable: true
        user_agent:
          type: string
          nullable: true
        request_id:
          type: string
          nullable: true
        old_values:
          type: object
          nullable: true
          additionalProperties: true
        new_values:
          type: object
          nullable: true
          additionalProperties: true
        metadata:
          type: object
          nullable: true
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    SearchSuggestion:
      type: object
      properties:
        type:
          type: string
          enum: [store, category]
        public_id:
          type: string
        name_ar:
          type: string
        name_en:
          type: string
          nullable: true
        slug:
          type: string
          nullable: true
        extra:
          type: object
          nullable: true
          additionalProperties: true

  # ──────────────────────────────────────────────────────────────────────────
  # Reusable Responses
  # ──────────────────────────────────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Missing or invalid authentication token.
      headers:
        X-Correlation-ID:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: "يجب تسجيل الدخول أولاً للوصول إلى هذا المصدر."
            error:
              code: UNAUTHENTICATED
              details: {}

    Forbidden:
      description: Authenticated but insufficient permissions.
      headers:
        X-Correlation-ID:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: "ليس لديك الصلاحية الكافية لإجراء هذه العملية."
            error:
              code: UNAUTHORIZED_ACTION
              details: {}

    NotFound:
      description: Resource not found.
      headers:
        X-Correlation-ID:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: "المصدر المطلوب غير موجود."
            error:
              code: RESOURCE_NOT_FOUND
              details: {}

    UnprocessableEntity:
      description: Validation failed.
      headers:
        X-Correlation-ID:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'

    Conflict:
      description: Business rule conflict.
      headers:
        X-Correlation-ID:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: "لا يمكن تنفيذ هذه العملية."
            error:
              code: BUSINESS_CONFLICT
              details: {}

    TooManyRequests:
      description: Rate limit exceeded.
      headers:
        X-Correlation-ID:
          schema:
            type: string
        Retry-After:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: "طلبات كثيرة جداً، يرجى المحاولة لاحقاً."
            error:
              code: RATE_LIMIT_EXCEEDED
              details:
                retry_after_seconds: 60

    InternalServerError:
      description: Unexpected server error.
      headers:
        X-Correlation-ID:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: "حدث خطأ داخلي في الخادم."
            error:
              code: INTERNAL_SERVER_ERROR
              details: {}

# ─────────────────────────────────────────────────────────────────────────────
# Tags
# ─────────────────────────────────────────────────────────────────────────────
tags:
  - name: System
    description: Health check and system bootstrap endpoints.
  - name: Authentication
    description: Login, logout, registration, and password recovery.
  - name: Email Verification
    description: Email address verification workflows.
  - name: Sessions
    description: Active session listing and revocation.
  - name: Categories
    description: Store categories — public read, admin write.
  - name: Cities
    description: Palestinian cities — public read, admin write.
  - name: Zones
    description: City zones/districts — public read, admin write.
  - name: Stores
    description: Public store directory.
  - name: Store Media
    description: Merchant store logo, cover, and gallery management.
  - name: Working Hours
    description: Merchant store working hours management.
  - name: Social Links
    description: Merchant store social media link management.
  - name: Offers
    description: Store offers — public read, merchant write, admin manage.
  - name: Subscription Plans
    description: Subscription plan catalog — public read, admin write.
  - name: Subscriptions
    description: Store subscriptions — merchant read, admin manage.
  - name: Notifications
    description: In-app notifications for authenticated users.
  - name: Dashboards
    description: Admin and merchant dashboard analytics.
  - name: Search
    description: Full-text search and auto-complete suggestions.
  - name: Settings
    description: Platform system settings.
  - name: Pages
    description: Static content pages.
  - name: FAQs
    description: Frequently asked questions.
  - name: Users
    description: Admin user management.
  - name: Audit Logs
    description: Platform audit trail — admin only.
  - name: QR and Deep Links
    description: QR code generation and deep link resolution.

# ─────────────────────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────────────────────
paths:

  # ── System ──────────────────────────────────────────────────────────────────

  /health:
    get:
      operationId: systemHealth
      tags: [System]
      summary: Health check
      description: Returns HTTP 200 if the API is reachable.
      security: []
      responses:
        '200':
          description: API is healthy.
          content:
            application/json:
              example:
                status: ok

  /bootstrap:
    get:
      operationId: systemBootstrap
      tags: [System]
      summary: Bootstrap application data
      description: |
        Returns all data needed for mobile/web app initialization in a single request:
        active categories, active cities, public settings, and active subscription plans.
      security: []
      responses:
        '200':
          description: Bootstrap data.
          content:
            application/json:
              example:
                success: true
                message: "تم تحميل البيانات الأولية."
                data:
                  categories: []
                  cities: []
                  settings: {}
                  subscription_plans: []

  # ── Authentication ────────────────────────────────────────────────────────

  /auth/login:
    post:
      operationId: authLogin
      tags: [Authentication]
      summary: Login
      description: |
        Authenticate with email and password.
        Returns a Sanctum Bearer token and user profile.

        **Rate limit:** This endpoint is throttled.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: "merchant@example.test"
                password:
                  type: string
                  format: password
                  example: "secret123"
                device_name:
                  type: string
                  example: "iPhone 15 Pro"
                  description: Optional. Used to label the session token.
            example:
              email: "merchant@example.test"
              password: "secret123"
              device_name: "Android App"
      responses:
        '200':
          description: Login successful.
          headers:
            X-Correlation-ID:
              schema:
                type: string
          content:
            application/json:
              example:
                success: true
                message: "تم تسجيل الدخول بنجاح."
                data:
                  token_type: Bearer
                  access_token: "<sanctum-token>"
                  user:
                    public_id: "01HZ..."
                    name: "أحمد محمود"
                    email: "merchant@example.test"
                    roles: [merchant]
                    status: active
        '401':
          description: Invalid credentials.
          content:
            application/json:
              example:
                success: false
                message: "بيانات الدخول غير صحيحة."
                error:
                  code: INVALID_CREDENTIALS
                  details: {}
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/register/merchant:
    post:
      operationId: authRegisterMerchant
      tags: [Authentication]
      summary: Register merchant
      description: |
        Create a new merchant account.
        Returns a Sanctum Bearer token and user profile.
        A verification email is sent automatically.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, password_confirmation]
              properties:
                name:
                  type: string
                  example: "أحمد محمود"
                email:
                  type: string
                  format: email
                  example: "merchant@example.test"
                phone:
                  type: string
                  example: "+970590000000"
                password:
                  type: string
                  format: password
                  minLength: 8
                password_confirmation:
                  type: string
                  format: password
                preferred_locale:
                  type: string
                  enum: [ar, en]
                  default: ar
                device_name:
                  type: string
                  example: "Android App"
      responses:
        '201':
          description: Registration successful.
          content:
            application/json:
              example:
                success: true
                message: "تم إنشاء الحساب بنجاح."
                data:
                  token_type: Bearer
                  access_token: "<sanctum-token>"
                  user:
                    public_id: "01HZ..."
                    name: "أحمد محمود"
                    roles: [merchant]
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /auth/logout:
    post:
      operationId: authLogout
      tags: [Authentication]
      summary: Logout
      description: Revoke the current session token.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logged out successfully.
          content:
            application/json:
              example:
                success: true
                message: "تم تسجيل الخروج بنجاح."
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      operationId: authMe
      tags: [Authentication]
      summary: Get current user profile
      description: Returns the authenticated user's full profile including roles and permissions.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user profile.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/forgot-password:
    post:
      operationId: authForgotPassword
      tags: [Authentication]
      summary: Request password reset
      description: |
        Sends a password reset link to the provided email address.
        Always returns 200 regardless of whether the email exists (prevents enumeration).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: "merchant@example.test"
      responses:
        '200':
          description: Reset link sent (or silently suppressed if email not found).
          content:
            application/json:
              example:
                success: true
                message: "تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك الإلكتروني."
                data: null
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /auth/reset-password:
    post:
      operationId: authResetPassword
      tags: [Authentication]
      summary: Reset password
      description: |
        Reset password using the token from the password reset email.
        The token is valid for 60 minutes.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, email, password, password_confirmation]
              properties:
                token:
                  type: string
                  example: "<reset-token-from-email>"
                email:
                  type: string
                  format: email
                  example: "merchant@example.test"
                password:
                  type: string
                  format: password
                  minLength: 8
                password_confirmation:
                  type: string
                  format: password
      responses:
        '200':
          description: Password reset successfully.
          content:
            application/json:
              example:
                success: true
                message: "تم إعادة تعيين كلمة المرور بنجاح."
                data: null
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ── Email Verification ────────────────────────────────────────────────────

  /auth/email/verification-notification:
    post:
      operationId: emailResendVerification
      tags: [Email Verification]
      summary: Resend verification email
      description: Sends a new email verification link to the authenticated user's email address.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Verification email sent.
          content:
            application/json:
              example:
                success: true
                message: "تم إرسال رابط التحقق إلى بريدك الإلكتروني."
                data: null
        '400':
          description: Email already verified.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/email/verify/{id}/{hash}:
    get:
      operationId: emailVerify
      tags: [Email Verification]
      summary: Verify email address
      description: |
        Verifies the user's email address using the signed URL from the verification email.
        This URL is typically opened in a browser (via deep link or redirect).
        Redirects to the frontend URL configured in `PALVERSE_FRONTEND_VERIFY_EMAIL_URL`.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: User's database ID (internal, from the signed URL).
        - name: hash
          in: path
          required: true
          schema:
            type: string
          description: Email hash from the signed URL.
        - name: signature
          in: query
          required: true
          schema:
            type: string
          description: URL signature for verification.
        - name: expires
          in: query
          required: true
          schema:
            type: integer
      responses:
        '302':
          description: Redirects to frontend verify-email page with status parameter.
        '403':
          description: Invalid or expired signature.

  /auth/email/status:
    get:
      operationId: emailVerificationStatus
      tags: [Email Verification]
      summary: Get email verification status
      description: Returns whether the current user's email is verified.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Verification status.
          content:
            application/json:
              example:
                success: true
                message: ""
                data:
                  email_verified: true
                  email_verified_at: "2026-01-10T08:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Sessions ──────────────────────────────────────────────────────────────

  /auth/sessions:
    get:
      operationId: sessionsList
      tags: [Sessions]
      summary: List active sessions
      description: Returns all active Sanctum tokens for the authenticated user.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of active sessions.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/sessions/{publicId}:
    delete:
      operationId: sessionsRevoke
      tags: [Sessions]
      summary: Revoke a specific session
      description: Revokes the specified session token. Users cannot revoke their current session this way.
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
          description: The public_id of the session to revoke.
      responses:
        '200':
          description: Session revoked.
          content:
            application/json:
              example:
                success: true
                message: "تم إلغاء الجلسة بنجاح."
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /auth/sessions/others:
    delete:
      operationId: sessionsRevokeOthers
      tags: [Sessions]
      summary: Revoke all other sessions
      description: Revokes all session tokens except the current one.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Other sessions revoked.
          content:
            application/json:
              example:
                success: true
                message: "تم إلغاء جميع الجلسات الأخرى."
                data:
                  revoked_count: 3
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/sessions/all:
    delete:
      operationId: sessionsRevokeAll
      tags: [Sessions]
      summary: Revoke all sessions (logout everywhere)
      description: Revokes all session tokens including the current one. Equivalent to logout everywhere.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: All sessions revoked.
          content:
            application/json:
              example:
                success: true
                message: "تم تسجيل الخروج من جميع الأجهزة."
                data:
                  revoked_count: 4
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Public Taxonomy ───────────────────────────────────────────────────────

  /categories:
    get:
      operationId: publicListCategories
      tags: [Categories]
      summary: List categories
      description: Returns all active store categories. No authentication required.
      security: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: is_active
          in: query
          schema:
            type: boolean
          description: Filter by active status. Defaults to showing all active categories for public.
      responses:
        '200':
          description: Paginated list of categories.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'

  /categories/{slug}:
    get:
      operationId: publicGetCategory
      tags: [Categories]
      summary: Get category by slug
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          example: "restaurants-cafes"
      responses:
        '200':
          description: Category detail.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Category'
        '404':
          $ref: '#/components/responses/NotFound'

  /cities:
    get:
      operationId: publicListCities
      tags: [Cities]
      summary: List cities
      description: Returns all active Palestinian cities.
      security: []
      responses:
        '200':
          description: List of cities.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/City'

  /cities/{publicId}/zones:
    get:
      operationId: publicListCityZones
      tags: [Zones]
      summary: List zones for a city
      description: Returns all active zones belonging to the specified city.
      security: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
          example: "01HZ..."
      responses:
        '200':
          description: List of zones.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Zone'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Public Stores ─────────────────────────────────────────────────────────

  /stores:
    get:
      operationId: publicListStores
      tags: [Stores]
      summary: List public stores
      description: |
        Paginated directory of approved and active stores.
        Supports full-text search, category, city, and zone filtering.
      security: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: query
          in: query
          schema:
            type: string
            maxLength: 100
          description: Full-text search query.
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category slug.
        - name: city
          in: query
          schema:
            type: string
          description: Filter by city public_id.
        - name: zone
          in: query
          schema:
            type: string
          description: Filter by zone public_id.
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/DirectionParam'
      responses:
        '200':
          description: Paginated store listing.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Store'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'

  /stores/{slug}:
    get:
      operationId: publicGetStore
      tags: [Stores]
      summary: Get store by slug
      description: Returns full store detail including logo, cover, gallery, and active offers.
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          example: "al-zaytoun-restaurant"
      responses:
        '200':
          description: Store detail.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Store'
        '404':
          $ref: '#/components/responses/NotFound'

  /stores/{slug}/offers:
    get:
      operationId: publicListStoreOffers
      tags: [Offers]
      summary: List store's public offers
      description: Returns active and currently-valid offers for the specified store.
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Paginated offers.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Offer'
        '404':
          $ref: '#/components/responses/NotFound'

  /stores/{slug}/links:
    get:
      operationId: publicGetStoreLinks
      tags: [QR and Deep Links]
      summary: Get store links (public)
      description: Returns web URL, deep link, and QR URLs for a public store.
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Store link data.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StoreLinks'
        '404':
          $ref: '#/components/responses/NotFound'

  /stores/{slug}/qr:
    get:
      operationId: publicGetStoreQr
      tags: [QR and Deep Links]
      summary: Get store QR code (public)
      description: |
        Returns an SVG or PNG QR code for the store's public URL.

        **Important:** This endpoint returns `image/svg+xml` (default) or `image/png`, NOT JSON.

        The store must be approved and publicly visible. Returns 404 if not visible.
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: size
          in: query
          schema:
            type: integer
            minimum: 128
            maximum: 1024
            default: 512
          description: QR image size in pixels (square).
        - name: format
          in: query
          schema:
            type: string
            enum: [svg, png]
            default: svg
          description: Output format.
        - name: download
          in: query
          schema:
            type: integer
            enum: [0, 1]
            default: 0
          description: "If 1, sets Content-Disposition: attachment to trigger browser download."
      responses:
        '200':
          description: QR code image.
          content:
            image/svg+xml:
              schema:
