      description: |
        Returns all stores regardless of status.
        **Requires:** `stores.view` permission.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
        - name: is_active
          in: query
          schema:
            type: boolean
        - name: category
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: query
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/DirectionParam'
      responses:
        '200':
          description: Paginated stores.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/stores/{publicId}:
    get:
      operationId: adminGetStore
      tags: [Stores]
      summary: Get store detail (admin)
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Store detail with owner info.
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/stores/{publicId}/approve:
    patch:
      operationId: adminApproveStore
      tags: [Stores]
      summary: Approve a store
      description: |
        Approves a pending store. Generates a slug if not set.
        **Requires:** `stores.approve` permission.
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Store approved.
          content:
            application/json:
              example:
                success: true
                message: "تمت الموافقة على المتجر بنجاح."
                data:
                  status: approved
        '409':
          description: Store already approved.
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/stores/{publicId}/reject:
    patch:
      operationId: adminRejectStore
      tags: [Stores]
      summary: Reject a store
      description: |
        Rejects a pending store with a mandatory reason.
        **Requires:** `stores.approve` permission.
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rejection_reason]
              properties:
                rejection_reason:
                  type: string
                  example: "المتجر لا يستوفي شروط المنصة."
      responses:
        '200':
          description: Store rejected.
        '409':
          description: Store is not in pending status.
        '422':
