  # ── Admin Audit Logs ──────────────────────────────────────────────────────

  /admin/audit-logs:
    get:
      operationId: adminListAuditLogs
      tags: [Audit Logs]
      summary: List audit logs
      description: |
        Returns paginated audit log entries.
        **Requires:** `admin` role and `audit-logs.view` permission.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: action
          in: query
          schema:
            type: string
          description: Filter by audit action string (e.g., `store.approved`).
        - name: actor_type
          in: query
          schema:
            type: string
            enum: [user, system]
        - name: subject_type
          in: query
          schema:
            type: string
          description: Filter by subject type (e.g., `store`, `user`).
        - name: subject_public_id
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/DirectionParam'
      responses:
        '200':
          description: Paginated audit logs.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditLog'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/audit-logs/{publicId}:
    get:
      operationId: adminGetAuditLog
      tags: [Audit Logs]
      summary: Get audit log entry
      security:
        - BearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Audit log detail.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuditLog'
        '404':
          $ref: '#/components/responses/NotFound'
